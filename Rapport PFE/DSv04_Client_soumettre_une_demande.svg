@startuml
title DS v04 - Client : soumettre une demande (DRAFT vers SUBMITTED)

skinparam defaultFontSize 10
skinparam shadowing false
skinparam roundcorner 8
skinparam sequenceMessageAlign center

actor "Client" as U
participant "SPA React" as FE
participant "ClientRequestController\nPOST .../submit" as CRC
participant "Regles metier\n(service ouvert, CIN...)" as BR
participant "RequestNotificationService" as NS
database "SGBD" as DB

U -> FE : Soumettre demande\n(id + field_values optionnel)
activate FE

FE -> CRC : POST /api/client/requests/{id}/submit\nCookie session Sanctum
activate CRC

CRC -> CRC : auth + role client\n+ find demande DRAFT du user
CRC -> BR : ensureServiceAcceptsClientRequests\n+ CIN profil si role client
activate BR
BR - -> CRC
deactivate BR

alt Preconditions KO
  CRC - -> FE : 422 (profil, service ferme...)
  deactivate CRC
  FE - -> U : Message
  deactivate FE
else OK
  CRC -> DB : BEGIN TRANSACTION
  activate DB

  CRC -> DB : maj field_values si fournis\nDELETE + persist
  DB - -> CRC

  CRC -> DB : UPDATE requests\nSUBMITTED, submitted_at...
  DB - -> CRC

  CRC -> DB : INSERT request_histories\n(action SUBMITTED / transition)
  DB - -> CRC

  CRC -> NS : notifier (e-mail activite\nselon config)
  activate NS
  NS - -> CRC
  deactivate NS

  CRC -> DB : COMMIT
  DB - -> CRC
  deactivate DB

  CRC - -> FE : 200 demande soumise
  deactivate CRC
  FE - -> U : Confirmation
  deactivate FE
end

note over FE, CRC
  Endpoint : POST /api/client/requests/{id}/submit\n(auth:sanctum, prefix client).
end note
@enduml

