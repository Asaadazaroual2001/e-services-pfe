@startuml
title Vue de synthèse - Relations entre les diagrammes A, B et C
top to bottom direction
skinparam shadowing false
skinparam packageStyle rectangle
skinparam defaultTextAlignment center
skinparam ArrowColor #4A4A4A
skinparam ArrowThickness 1.3
skinparam package {
  BackgroundColor #F8F9FA
  BorderColor #7A7A7A
  FontStyle bold
}

rectangle "<b>Diagramme Plan A</b>\nAccès & Organisation\n(User, Role, Permission, Agency)" as A #EAF3FF
rectangle "<b>Diagramme Plan B</b>\nCatalogue des services\n(Service, ServiceField)" as B #EEFBEA
rectangle "<b>Diagramme Plan C</b>\nDemandes & Suivi\n(Request, Documents, Historique, Commentaires)" as C #FFF4E8

A - -> B : Agency structure\nles services
A - -> C : User initie/assigne\net commente
B - -> C : Service + champs\nalimentent la demande

note bottom of A
Gère les acteurs, rôles
et rattachement agence.
end note

note bottom of B
Définit l'offre de service
et les champs dynamiques.
end note

note bottom of C
Exécute le cycle de vie
complet de la demande.
end note
@enduml

