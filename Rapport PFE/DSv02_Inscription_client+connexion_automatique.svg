" x="373" y="453.5479">Auth::login + regenerate session</text><polygon fill="#181818" points="213,504.1875,203,508.1875,213,512.1875,209,508.1875" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="207" x2="365" y1="508.1875" y2="508.1875"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="140" x="214" y="492.1885">200 Registered and logged in</text><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="58" x="255" y="503.8291">+ user roles</text><polygon fill="#181818" points="52,529.8281,42,533.8281,52,537.8281,48,533.8281" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="46" x2="201" y1="533.8281" y2="533.8281"/><text fill="#000000" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="137" x="53" y="529.4697">Compte cree, session active</text><!--MD5=[1036a16ae5b854ace4648d4a5d4d7aab]
@startuml
title DS v02 - Inscription client + connexion automatique

skinparam defaultFontSize 10
skinparam shadowing false
skinparam roundcorner 8
skinparam sequenceMessageAlign center

actor "Visiteur" as U
participant "SPA React" as FE
participant "AuthController\nPOST /register (web)" as AC
participant "Role (client)" as R
database "SGBD" as DB

U -> FE : Formulaire inscription\nname email cin password
activate FE

FE -> AC : POST /register\nJSON + CSRF session
activate AC

AC -> DB : validation unique email
activate DB
DB - -> AC
deactivate DB

alt Email deja utilise
  AC - -> FE : 422 validation
  deactivate AC
  FE - -> U : Erreur
  deactivate FE
else OK
  AC -> DB : INSERT users (hash password)
  activate DB
  DB - -> AC
  deactivate DB

  AC -> R : attacher role client\n(sync role_user)
  activate R
  R -> DB : pivot role_user
  activate DB
  DB - -> R
  deactivate DB
  deactivate R

  AC -> AC : Auth::login + regenerate session
  AC - -> FE : 200 Registered and logged in\n+ user roles
  deactivate AC

  FE - -> U : Compte cree, session active
  deactivate FE
end
@enduml

