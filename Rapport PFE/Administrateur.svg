@startuml
title DCU - Administrateur

left to right direction
skinparam defaultFontSize 9
skinparam shadowing false
skinparam roundcorner 6
skinparam usecaseFontSize 8
scale 0.85

actor "Administrateur" as ADM

rectangle "Plateforme E-Services" {
  usecase "Agences CRUD\nadmin seulement" as U_AGC
  usecase "Liste agences\nadmin + responsable" as U_AGL
  usecase "Users annuaire roles\n/api/admin/users..." as U_USR
  usecase "Services + champs dynamiques\n/admin/services + fields" as U_SVC
  usecase "Toggle service actif\n.../toggle-active" as U_STOG
  usecase "Dashboard + liste\n/admin/dashboard + requests" as U_DASH
  usecase "Traiter dossier\nassign vue approve reject..." as U_TRT
  usecase "Emails client +\nnouvelles demandes\n/api/staff/*" as U_STF
  usecase "E-mail automatique\nMail + EmailJS" as U_MAIL
}

actor "Systeme\n(e-mail)" as SYS

ADM - -> U_AGC
ADM - -> U_AGL
ADM - -> U_USR
ADM - -> U_SVC
ADM - -> U_STOG
ADM - -> U_DASH
ADM - -> U_TRT
ADM - -> U_STF

U_TRT ..> U_MAIL : <<include>>
U_STOG ..> U_MAIL : <<include>>
U_MAIL ..> SYS
@enduml

