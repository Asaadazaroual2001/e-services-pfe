@startuml
title Diagramme de deploiement - Plateforme E-Services

top to bottom direction

skinparam defaultFontSize 9
skinparam shadowing false
skinparam roundcorner 8
skinparam nodesep 16
skinparam ranksep 28

scale 0.78

actor "Navigateur\nweb" as Nav

cloud "Messagerie SMTP\n(fournisseur externe)" as SMTP <<externe>>
cloud "EmailJS\n(api.emailjs.com)" as EJS <<externe>>

node "Machine hote ou VM\n(serveur cloud / on-premise)" as Host {

  node "Conteneurs Docker\n(reseau bridge interne)" as Docker {

    artifact "e-services-web\n<<image>>\nReact (build) + Nginx\nport 80/443 expose" as Web

    artifact "e-services-api\n<<image>>\nLaravel PHP + PHP-FPM\n(ou Apache mod_php)" as Api

    database "SGBD\n<<conteneur PostgreSQL>>\nou base managée (cloud)\nport SQL interne" as Db

    storage "volume donnees\nPostgreSQL" as VolPg

    storage "volume fichiers\nstorage/app / pieces jointes" as VolData

    Web -[hidden]down- Api
    Api -[hidden]down- Db
    Db -[hidden]down- VolPg
    VolPg -[hidden]down- VolData
  }
}

Nav - -> Web : HTTPS\n(cookies Secure SameSite)

Web - -> Api : reverse proxy\n/api vers backend\nHTTP interne conteneurs

Api - -> Db : SQL via PDO\n(Eloquent)

Api - -> VolData : montage volume\nlecture ecriture fichiers

VolPg .. Db : donnees persistantes\nsur disque hote

Nav ..> EJS : HTTPS\ncontact public\n(depuis le navigateur)

Api ..> SMTP : SMTP / TLS\nLaravel Mail
@enduml

