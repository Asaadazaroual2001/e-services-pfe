@startuml
title DCU - Client

left to right direction
skinparam defaultFontSize 9
skinparam shadowing false
skinparam roundcorner 6
skinparam usecaseFontSize 8
scale 0.95

actor "Client" as CLI

rectangle "Plateforme E-Services" {
  usecase "Login / logout\nregister web" as U_LOGIN
  usecase "MDP oublie / reset\n/api/password/*" as U_PWD
  usecase "Profil GET/PUT\n/api/me" as U_ME
  usecase "Lister / detail service\nGET /api/services" as U_CAT
  usecase "Demande sans compte\ntoken /api/public/*" as U_PUB
  usecase "Mes demandes CRUD\nPJ /api/client/requests" as U_CLIR
  usecase "Soumettre demande\n.../submit" as U_SUB
  usecase "Profil + commentaires\nprofile + comments" as U_CLI2
  usecase "E-mail automatique\nMail + EmailJS" as U_MAIL
}

actor "Systeme\n(e-mail)" as SYS

CLI - -> U_LOGIN
CLI - -> U_PWD
CLI - -> U_ME
CLI - -> U_CAT
CLI - -> U_PUB
CLI - -> U_CLIR
CLI - -> U_SUB
CLI - -> U_CLI2

U_SUB ..> U_MAIL : <<include>>
U_PUB ..> U_MAIL : <<include>>
U_MAIL ..> SYS

note bottom of U_ME
  Auth : Sanctum session + CSRF
end note
@enduml

