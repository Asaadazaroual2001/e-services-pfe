@startuml
title DS v01 - CSRF Sanctum + connexion (session cookie)

skinparam defaultFontSize 10
skinparam shadowing false
skinparam roundcorner 8
skinparam sequenceMessageAlign center

actor "Utilisateur" as U
participant "SPA React\n(Axios credentials)" as FE
participant "Sanctum\nGET /sanctum/csrf-cookie" as CSRF
participant "AuthController\nPOST /login (web)" as AC
participant "Session +\nAuth guard web" as SE
database "SGBD" as DB

U -> FE : Saisir email / mot de passe
activate FE

FE -> CSRF : GET /sanctum/csrf-cookie\n(credentials)
activate CSRF
CSRF - -> FE : 204 + cookie XSRF-TOKEN
deactivate CSRF

FE -> AC : POST /login\nJSON email, password\nHeader X-XSRF-TOKEN + Cookie
activate AC

AC -> SE : Auth::attempt
activate SE
SE -> DB : verifier utilisateur
activate DB
DB - -> SE
deactivate DB

alt Echec
  SE - -> AC : false
  AC - -> FE : 422 Invalid credentials
  deactivate SE
  deactivate AC
  FE - -> U : Message erreur
else Succes
  SE -> SE : session regenerate
  SE - -> AC : utilisateur authentifie
  deactivate SE
  AC - -> FE : 200 Logged in\nSet-Cookie session
  deactivate AC
  FE - -> U : Connecte
end

deactivate FE

note over FE, AC
  Routes web (routes/web.php).\nCORS : paths login, sanctum/csrf-cookie.\nPas de Bearer JWT pour le SPA first-party.
end note
@enduml

