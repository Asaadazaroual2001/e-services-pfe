@startuml
title Diagramme de classes - Partie A (Accès & Organisation)
skinparam classAttributeIconSize 0
hide methods

class User {
  +id: bigint
  +name: string
  +email: string
  +password: string
  +agency_id: bigint?
}

class Role {
  +id: bigint
  +name: string
}

class Permission {
  +id: bigint
  +name: string
}

class Agency {
  +id: bigint
  +name: string
  +is_active: boolean
}

User "0..*" - -> "1" Agency
User "*" - - "*" Role
Role "*" - - "*" Permission
@enduml

