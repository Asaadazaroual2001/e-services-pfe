@startuml
title DCU - Système d'envoi d'e-mails

left to right direction
skinparam shadowing false
skinparam roundcorner 10

actor "Système (SMTP / Email)" as SYS

rectangle "Plateforme E-Services" {

  ' Use case principal
  usecase "Envoyer e-mail automatique" as UC_MAIL

  ' Triggers métier
  usecase "Publication nouveau service" as UC_NEW_SERVICE
  usecase "Mise à jour statut demande" as UC_UPDATE_DEMANDE
  usecase "Création demande (confirmation)" as UC_CREATE_DEMANDE
  usecase "Réinitialisation mot de passe" as UC_RESET_PASSWORD

}

' Relations include (trigger -> email)
UC_NEW_SERVICE .> UC_MAIL : <<include>>
UC_UPDATE_DEMANDE .> UC_MAIL : <<include>>
UC_CREATE_DEMANDE .> UC_MAIL : <<include>>
UC_RESET_PASSWORD .> UC_MAIL : <<include>>

' External email system
UC_MAIL - -> SYS
@enduml

