@startuml
title DCU - Agent d agence

left to right direction
skinparam defaultFontSize 9
skinparam shadowing false
skinparam roundcorner 6
skinparam usecaseFontSize 8
scale 0.95

actor "Agent\nd agence" as AGT

rectangle "Plateforme E-Services" {
  usecase "Dashboard + liste\n/admin/dashboard + requests" as U_DASH
  usecase "Traiter dossier\nassign vue approve reject..." as U_TRT
  usecase "Emails client +\nnouvelles demandes\n/api/staff/*" as U_STF
  usecase "E-mail automatique\nMail + EmailJS" as U_MAIL
}

actor "Systeme\n(e-mail)" as SYS

AGT - -> U_DASH
AGT - -> U_TRT
AGT - -> U_STF

U_TRT ..> U_MAIL : <<include>>
U_MAIL ..> SYS
@enduml

