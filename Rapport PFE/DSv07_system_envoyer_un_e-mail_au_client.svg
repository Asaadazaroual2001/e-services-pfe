ize="10" lengthAdjust="spacing" textLength="306" x="224" y="527.1104">Middleware : auth:sanctum + role:\nadmin, agent, responsable.</text><!--MD5=[3b3ff41e2d8ab66df6ee425407d716ae]
@startuml
title DS v07 - Staff : envoyer un e-mail au client (trace + SMTP)

skinparam defaultFontSize 10
skinparam shadowing false
skinparam roundcorner 8
skinparam sequenceMessageAlign center

actor "Agent / admin /\nresponsable" as U
participant "SPA React" as FE
participant "StaffClientEmailController\nPOST /api/staff/client-emails" as STC
participant "Mailable\nStaffClientMessageMail" as MAI
participant "Transport\nSMTP (Laravel Mail)" as SMTP
database "SGBD" as DB

U -> FE : Rediger message client
activate FE

FE -> STC : POST /api/staff/client-emails\nJSON destinataire sujet corps\n+ request_id optionnel\nCookie session + role staff
activate STC

STC -> DB : valider + persister\nstaff_client_emails\n+ sender_id
activate DB
DB - -> STC
deactivate DB

alt Validation KO
  STC - -> FE : 422
  deactivate STC
  FE - -> U : Erreur
  deactivate FE
else OK
  STC -> MAI : construire Mailable
  activate MAI
  MAI - -> STC
  deactivate MAI

  STC -> SMTP : Mail::to(...)->send
  activate SMTP
  SMTP - -> STC
  deactivate SMTP

  STC - -> FE : 201 message envoye / enregistre
  deactivate STC
  FE - -> U : Confirmation
  deactivate FE
end

note over STC
  Middleware : auth:sanctum + role:\nadmin, agent, responsable.
end note
@enduml

