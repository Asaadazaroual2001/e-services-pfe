@startuml
title Diagramme de classes - Partie B (Catalogue services)
skinparam classAttributeIconSize 0
hide methods

class Agency {
  +id: bigint
  +name: string
}

class Service {
  +id: bigint
  +agency_id: bigint
  +name: string
  +description: text
  +is_active: boolean
  +published_at: datetime?
  +request_deadline_at: datetime?
}

class ServiceField {
  +id: bigint
  +service_id: bigint
  +label: string
  +type: string
  +is_required: boolean
  +position: int
}

Service "0..*" - -> "1" Agency
ServiceField "0..*" - -> "1" Service
@enduml

