@startuml
title DCU - Responsable système

left to right direction
skinparam shadowing false
skinparam roundcorner 8

actor "Responsable système" as RSY
actor "Système (Email)" as SYS

rectangle "Plateforme E-Services" {

  ' - - - Agences - - -
  usecase "Créer agence" as UC_AG_CREATE
  usecase "Consulter agences" as UC_AG_READ
  usecase "Modifier agence" as UC_AG_UPDATE
  usecase "Supprimer agence" as UC_AG_DELETE

  ' - - - Employees - - -
  usecase "Créer employé" as UC_EMP_CREATE
  usecase "Consulter employés" as UC_EMP_READ
  usecase "Modifier employé" as UC_EMP_UPDATE
  usecase "Supprimer employé" as UC_EMP_DELETE

  ' - - - Email - - -
  usecase "Envoyer e-mail automatique" as UC_MAIL
}

' Relations Responsable système
RSY - -> UC_AG_CREATE
RSY - -> UC_AG_READ
RSY - -> UC_AG_UPDATE
RSY - -> UC_AG_DELETE

RSY - -> UC_EMP_CREATE
RSY - -> UC_EMP_READ
RSY - -> UC_EMP_UPDATE
RSY - -> UC_EMP_DELETE

' Email lié (مثلا création employé)
UC_EMP_CREATE ..> UC_MAIL : <<include>>

' External system
UC_MAIL - -> SYS
@enduml

