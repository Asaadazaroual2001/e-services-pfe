<!--
  MODÈLE EMAILJS — ADD-Services / E-Services (e-mails vers clients)
  ================================================================
  1. Sur https://dashboard.emailjs.com → Email Templates → Create new template
  2. Nom : ex. « Client — notification ADD-Services »
  3. Coller ce HTML dans le corps du modèle (onglet Content, mode HTML si proposé)

  Champs à lier dans EmailJS (Settings du template) :
    • To email   → {{to_email}}
    • From name → ADD-Services (ou votre nom d’expéditeur fixe)
    • Subject   → {{email_subject}}

  Variables utilisées par Laravel (config/emailjs.php) :
    {{to_email}}, {{to_name}}, {{email_subject}}, {{message}}
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{email_subject}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f1f5f9;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);padding:20px 24px;">
              <p style="margin:0;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.85);">ADD-Services</p>
              <h1 style="margin:8px 0 0;font-size:20px;font-weight:700;color:#ffffff;line-height:1.3;">E-Services</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 24px 8px;">
              <p style="margin:0 0 16px;font-size:16px;color:#0f172a;line-height:1.5;">
                Bonjour <strong>{{to_name}}</strong>,
              </p>
              <div style="font-size:15px;color:#334155;line-height:1.65;border-left:4px solid #e2e8f0;padding-left:16px;margin:0 0 24px;">
                <pre style="margin:0;font-family:inherit;white-space:pre-wrap;word-break:break-word;">{{message}}</pre>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px 28px;">
              <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.5;">
                Cet e-mail a été envoyé automatiquement par la plateforme E-Services.<br>
                Merci de ne pas répondre directement à cette adresse technique si elle est noreply.
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#f8fafc;padding:16px 24px;border-top:1px solid #e2e8f0;">
              <p style="margin:0;font-size:12px;color:#64748b;text-align:center;">
                © ADD-Services — Portail e-services
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
